  <g class="row" style="animation-delay:0.15s"><text x="590" y="165" class="key">user</text><text x="765" y="165" class="value">Kshitij Chaudhary</text></g><g class="row" style="animation-delay:0.27s"><text x="590" y="203" class="key">role</text><text x="765" y="203" class="value">Full Stack Developer</text></g><g class="row" style="animation-delay:0.39s"><text x="590" y="241" class="key">location</text><text x="765" y="241" class="value">Ontario, Canada</text></g><g class="row" style="animation-delay:0.51s"><text x="590" y="279" class="key">mission</text><text x="765" y="279" class="value">Building production-level software products</text></g><g class="row" style="animation-delay:0.63s"><text x="590" y="317" class="key">current</text><text x="765" y="317" class="value">NepStack • Munmai • Applied AI</text></g><g class="row" style="animation-delay:0.75s"><text x="590" y="355" class="key">stack</text><text x="765" y="355" class="value">.NET • Angular • TypeScript • Python</text></g><g class="row" style="animation-delay:0.87s"><text x="590" y="393" class="key">languages</text><text x="765" y="393" class="value">JavaScript, Dart, Java, Python, C#</text></g><g class="row" style="animation-delay:0.99s"><text x="590" y="431" class="key">repos</text><text x="765" y="431" class="value">63</text></g><g class="row" style="animation-delay:1.11s"><text x="590" y="469" class="key">followers</text><text x="765" y="469" class="value">15</text></g><g class="row" style="animation-delay:1.23s"><text x="590" y="507" class="key">stars</text><text x="765" y="507" class="value">12</text></g><g class="row" style="animation-delay:1.35s"><text x="590" y="545" class="key">status</text><text x="765" y="545" class="value">Building systems, products, and engineering discipline</text></g>

  <line x1="550" y1="135" x2="550" y2="570" stroke="#30363d" stroke-width="2"/>
  <text x="55" y="605" class="footer">github.com/kshitijchaudhary</text>
  <text x="1140" y="605" text-anchor="end" class="footer">updated 2026-07-16 23:17 UTC</text>
</svg>
