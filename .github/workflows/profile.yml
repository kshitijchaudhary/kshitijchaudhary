name: Update terminal profile

on:
  workflow_dispatch:
  schedule:
    # GitHub cron schedules use UTC.
    - cron: "17 10 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - "assets/portrait.txt"
      - ".github/workflows/profile.yml"

permissions:
  contents: write

concurrency:
  group: terminal-profile
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate profile SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          PROFILE_NAME: "Kshitij Chaudhary"
          PROFILE_ROLE: "Full Stack Developer"
          PROFILE_LOCATION: "Ontario, Canada"
          PROFILE_MISSION: "Building production-level software products"
          PROFILE_CURRENT: "NepStack • Munmai • Applied AI"
          PROFILE_STACK: ".NET • Angular • TypeScript • Python"
          PROFILE_STATUS: "Shipping production software"
        run: python scripts/generate_profile.py

      - name: Commit generated SVG
        run: |
          if git diff --quiet -- assets/profile.svg; then
            echo "No profile changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile.svg
          git commit -m "chore: refresh terminal profile"
          git push
